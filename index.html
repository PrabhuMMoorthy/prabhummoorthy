<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My YouTube Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #ff0000;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 1.2rem;
    color: #ff0000;
    letter-spacing: 1px;
  }

  #add-btn {
    background: #ff0000;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.9rem;
    cursor: pointer;
  }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: #1e1e1e;
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 400px;
    border: 1px solid #333;
  }

  #modal h2 { margin-bottom: 16px; font-size: 1rem; color: #ccc; }

  #modal input {
    width: 100%;
    padding: 10px 14px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    margin-bottom: 10px;
    outline: none;
  }
  #modal input:focus { border-color: #ff0000; }

  .modal-hint {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .modal-actions button {
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
  }

  #cancel-btn { background: #333; color: #ccc; }
  #save-btn { background: #ff0000; color: #fff; }

  /* Grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
    padding: 20px;
  }

  .channel-card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px 12px;
    text-align: center;
    text-decoration: none;
    color: #fff;
    border: 1px solid #2a2a2a;
    position: relative;
    transition: border-color 0.2s, transform 0.1s;
    display: block;
  }

  .channel-card:active { transform: scale(0.97); }
  .channel-card:hover { border-color: #ff0000; }

  .channel-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #ff0000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: bold;
    margin: 0 auto 12px;
    color: #fff;
  }

  .channel-name {
    font-size: 0.85rem;
    font-weight: 600;
    word-break: break-word;
    line-height: 1.3;
  }

  .delete-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    background: none;
    border: none;
    color: #555;
    font-size: 1rem;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .delete-btn:hover { color: #ff4444; }

  #empty {
    grid-column: 1/-1;
    text-align: center;
    color: #555;
    padding: 60px 20px;
    font-size: 0.95rem;
    line-height: 2;
  }

  #empty span { display: block; font-size: 2rem; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <h1>▶ My Channels</h1>
  <button id="add-btn" onclick="openModal()">+ Add Channel</button>
</header>

<div id="grid">
  <div id="empty">
    <span>📺</span>
    No channels yet.<br>Tap <strong>+ Add Channel</strong> to get started.
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Add a Channel</h2>
    <input id="input-name" type="text" placeholder="Channel name (e.g. Veritasium)" />
    <input id="input-url" type="text" placeholder="Channel URL or @handle" />
    <p class="modal-hint">
      Paste the full URL like:<br>
      <code>https://www.youtube.com/@veritasium</code><br>
      or just the handle: <code>@veritasium</code>
    </p>
    <div class="modal-actions">
      <button id="cancel-btn" onclick="closeModal()">Cancel</button>
      <button id="save-btn" onclick="saveChannel()">Add</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'yt_channels';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save(channels) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(channels));
  }

  function normalizeUrl(raw) {
    raw = raw.trim();
    if (raw.startsWith('http')) return raw;
    if (raw.startsWith('@')) return 'https://www.youtube.com/' + raw;
    return 'https://www.youtube.com/@' + raw;
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  // Random muted color per channel for avatar
  const COLORS = ['#c0392b','#8e44ad','#2980b9','#16a085','#d35400','#27ae60','#2c3e50','#e74c3c'];
  function colorFor(name) {
    let h = 0;
    for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    return COLORS[h % COLORS.length];
  }

  function render() {
    const channels = load();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (channels.length === 0) {
      grid.innerHTML = `<div id="empty"><span>📺</span>No channels yet.<br>Tap <strong>+ Add Channel</strong> to get started.</div>`;
      return;
    }

    channels.forEach((ch, i) => {
      const card = document.createElement('a');
      card.className = 'channel-card';
      card.href = ch.url;
      card.target = '_blank';
      card.rel = 'noopener';
      card.innerHTML = `
        <button class="delete-btn" title="Remove">✕</button>
        <div class="channel-avatar" style="background:${colorFor(ch.name)}">${initials(ch.name)}</div>
        <div class="channel-name">${ch.name}</div>
      `;
      card.querySelector('.delete-btn').addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        deleteChannel(i);
      });
      grid.appendChild(card);
    });
  }

  function deleteChannel(index) {
    const channels = load();
    channels.splice(index, 1);
    save(channels);
    render();
  }

  function openModal() {
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('input-name').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('input-name').value = '';
    document.getElementById('input-url').value = '';
  }

  function saveChannel() {
    const name = document.getElementById('input-name').value.trim();
    const rawUrl = document.getElementById('input-url').value.trim();
    if (!name || !rawUrl) return;

    const channels = load();
    channels.push({ name, url: normalizeUrl(rawUrl) });
    save(channels);
    closeModal();
    render();
  }

  // Close modal on overlay click
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  // Enter key to save
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) saveChannel();
    if (e.key === 'Escape') closeModal();
  });

  render();
</script>
</body>
</html>
